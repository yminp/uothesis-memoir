%%%% AMS-like BibLaTeX style setting (Apr 11, 2023)

% Implemented BibLaTeX entry types:
% article, book, inbook, collection, incollection, proceedings, inproceedings, misc, unpublished, online, thesis

\RequirePackage{shortmathj} % For the abbreviations of the names of math journals.

\ExecuteBibliographyOptions{sorting=anyt, date=year, url=false, isbn=false}

% add each cited reference to some category
\DeclareBibliographyCategory{cited}
\AtEveryCitekey{\addtocategory{cited}{\thefield{entrykey}}}

% Font size setting
\renewcommand*{\bibfont}{\normalsize}

% for MR numbers
\DeclareDatamodelFields[type=field,datatype=verbatim]{mrnumber}
\DeclareDatamodelEntryfields{mrnumber}
\DeclareFieldFormat{mrnumber}{%
  {MR}%
  \ifhyperref
    {\href{http://www.ams.org/mathscinet-getitem?mr=#1}{\nolinkurl{#1}}}
    {\nolinkurl{#1}}}

  
%%% Dash (in author) Macro
\newbibmacro*{bbx:savehash}{\savefield{fullhash}{\bbx@lasthash}}

\DeclareBibliographyOption[boolean]{dashed}[true]{%
  \ifstrequal{#1}{true}
    {\ExecuteBibliographyOptions{pagetracker}%
     \renewbibmacro*{bbx:savehash}{\savefield{fullhash}{\bbx@lasthash}}}
    {\renewbibmacro*{bbx:savehash}{}}}
    
\ExecuteBibliographyOptions{dashed=true} %Dash option
    
\newbibmacro*{bbx:dashcheck}[2]{%
  \ifboolexpr{
    test {\iffieldequals{fullhash}{\bbx@lasthash}}
    and
    not test \iffirstonpage
  }
  {#1}
  {#2}}

\renewbibmacro*{author}{%
  \ifboolexpr{
    test \ifuseauthor
    and
    not test {\ifnameundef{author}}
  }
  {\usebibmacro{bbx:dashcheck}
    {\bibnamedash}
    {\printnames{author}%
      \setunit{\addcomma\space}%
      \usebibmacro{bbx:savehash}}%
    \usebibmacro{authorstrg}}
  {\global\undef\bbx@lasthash}}

\renewcommand*{\bibnamedash}{\rule{3em}{0.4pt}\hspace*{.16667em}\addcomma\addspace}


%% Setting punctuations
\renewcommand*{\newunitpunct}{\addcomma\addspace}
\renewcommand*{\subtitlepunct}{\textup{\addcolon}\addspace}
\renewcommand*{\authortypedelim}{\addspace}
\renewcommand*{\editortypedelim}{\addspace}
\renewcommand*{\translatortypedelim}{\addspace}

