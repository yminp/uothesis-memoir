%% For some fields
\DeclareFieldFormat*{title}{\mkbibemph{#1}}
\DeclareFieldFormat*{journaltitle}{\textup{#1}}
\DeclareFieldFormat*{booktitle}{\textup{#1}}
\DeclareFieldFormat*{pages}{#1}
\DeclareFieldFormat*{date}{#1}


\DeclareFieldFormat[article]{volume}{\mkbibbold{#1}}
\DeclareFieldFormat[article]{number}{\bibstring{number}~#1}
\DeclareFieldFormat[article]{series}{#1}

\DeclareFieldFormat[book]{part}{\mkbibemph{\bibstring{part}~#1}}
\DeclareFieldFormat[book]{volume}{\mkbibemph{\bibstring{volume}~#1}}
\DeclareFieldFormat[book, collection, proceedings, inbook, incollection, inproceedings]{number}{\mkbibbold{#1}}

% To shorten math journal nams using shortmathj
\DeclareFieldFormat[article]{titlecase}{\shortifyAMSjournalname{#1}}


% For some bib macros    

\newbibmacro*{title+language}{%
  \ifboolexpr{
    test {\iffieldundef{title}}
    and
    test {\iffieldundef{subtitle}}
  }
    {}
    {\printtext[title]{%
       \printfield[titlecase]{title}%
       \setunit{\subtitlepunct}%
       \printfield[titlecase]{subtitle}
    }%
    \setunit*{\addspace}%
  \iflistundef{language}{}{%
  \printtext[parens]{\printlist{language}}}
     \newunit}%
  \printfield{titleaddon}}

\newbibmacro*{maintitle+title+language}{%
  \iffieldsequal{maintitle}{title}
    {\clearfield{maintitle}%
     \clearfield{mainsubtitle}%
     \clearfield{maintitleaddon}}
    {\iffieldundef{maintitle}
       {}
       {\usebibmacro{maintitle}%
        \newunit\newblock
        \iffieldundef{volume}%
          {\printfield{part}%
          \setunit{\addcolon\space}}
          {\printfield{volume}\setunit{\addcomma\space}%
           \printfield{part}%
           \setunit{\addcolon\space}}%
        }
    }%
  \usebibmacro{title+language}%
  \newunit}

\renewbibmacro*{journal+issuetitle}{%
  \usebibmacro{journal}%
  \setunit*{\addspace}%
  \iffieldundef{series}
    {}
    {\newunit
     \printtext[parens]{\printfield{series}}%
     \setunit{\addspace}}%
  \printfield{volume}%
  \setunit{\addspace}%
  \usebibmacro{issue+date}%
  \setunit{\addcolon\space}%
  \usebibmacro{issue}%
  \setunit{\addcomma\space}%
  \printfield{number}%
  \newunit}

\renewbibmacro*{publisher+location+date}{%
  \printlist{publisher}%
  \setunit*{\addcomma\space}%
  \printlist{location}%
  \setunit*{\addcomma\space}%
  \usebibmacro{date}%
  \newunit}
  
  \renewbibmacro*{event+venue+date}{%
  \printfield{eventtitle}%
  \newunit
  \printfield{eventtitleaddon}%
  \ifboolexpr{
    test {\iffieldundef{venue}}
    and
    test {\iffieldundef{eventyear}}
  }
    {}
    {\setunit{\addspace}%
     \printtext[parens]{%
       \printeventdate%
       \setunit*{\addcomma\space}%
       \printfield{venue}}%
       }%
  \newunit}


\newbibmacro*{doi+eprint+url+note}{%
  \iftoggle{bbx:doi}
    {\printfield{doi}}
    {}%
  \newunit\newblock
  \printfield{mrnumber} % MR number
    \iftoggle{bbx:eprint}
      {\usebibmacro{eprint}}
      {}%
    \newunit\newblock
  \iftoggle{bbx:url}
    {\usebibmacro{url+urldate}}
    {}%
    \newunit\newblock
    \printfield{note}
    }


